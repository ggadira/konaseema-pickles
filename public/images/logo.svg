<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="jarBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5b7"/>
      <stop offset="100%" stop-color="#d4b896"/>
    </linearGradient>
    <linearGradient id="oilGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8a830" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#c0392b" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="lidGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#922b21"/>
    </linearGradient>
    <clipPath id="jarClip">
      <path d="M30 42 Q30 38 34 36 L86 36 Q90 38 90 42 L90 88 Q90 98 80 98 L40 98 Q30 98 30 88 Z"/>
    </clipPath>
  </defs>

  <!-- Outer circle badge -->
  <circle cx="60" cy="60" r="58" fill="none" stroke="#c0392b" stroke-width="2.5" opacity="0.2"/>
  <circle cx="60" cy="60" r="55" fill="none" stroke="#c0392b" stroke-width="0.5" opacity="0.15"/>

  <!-- Traditional clay jar (bharani) body -->
  <path d="M30 42 Q30 38 34 36 L86 36 Q90 38 90 42 L90 88 Q90 98 80 98 L40 98 Q30 98 30 88 Z" fill="url(#jarBody)" stroke="#b8975a" stroke-width="1"/>
  
  <!-- Jar shine -->
  <path d="M34 42 Q34 40 36 38 L38 38 Q36 40 36 42 L36 86 Q36 92 40 92 L38 92 Q34 92 34 86 Z" fill="#fff" opacity="0.25"/>

  <!-- Pickle oil layer inside jar -->
  <rect x="32" y="38" width="56" height="14" fill="url(#oilGlow)" clip-path="url(#jarClip)"/>

  <!-- Mango pickle chunks -->
  <rect x="38" y="54" width="10" height="8" rx="2" fill="#e8a830" transform="rotate(12 43 58)"/>
  <rect x="52" y="58" width="9" height="7" rx="2" fill="#d4952a" transform="rotate(-8 56 61)"/>
  <rect x="66" y="55" width="10" height="8" rx="2" fill="#eab540" transform="rotate(5 71 59)"/>
  <rect x="44" y="68" width="8" height="7" rx="2" fill="#d4952a" transform="rotate(-15 48 71)"/>
  <rect x="58" y="70" width="9" height="7" rx="2" fill="#e8a830" transform="rotate(10 62 73)"/>
  <rect x="72" y="67" width="8" height="7" rx="2" fill="#eab540" transform="rotate(-5 76 70)"/>

  <!-- Red chili pieces -->
  <path d="M36 62 Q40 58 44 64" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M62 64 Q66 60 70 66" stroke="#e74c3c" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M48 78 Q52 74 56 80" stroke="#c0392b" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Mustard seeds -->
  <circle cx="40" cy="82" r="1.8" fill="#8B6914"/>
  <circle cx="55" cy="84" r="1.5" fill="#8B6914"/>
  <circle cx="68" cy="80" r="1.8" fill="#8B6914"/>
  <circle cx="76" cy="76" r="1.5" fill="#8B6914"/>
  <circle cx="35" cy="74" r="1.5" fill="#8B6914"/>

  <!-- Green curry leaves -->
  <ellipse cx="45" cy="48" rx="5" ry="2.5" fill="#27ae60" transform="rotate(-30 45 48)" opacity="0.8"/>
  <ellipse cx="65" cy="50" rx="4" ry="2" fill="#2ecc71" transform="rotate(20 65 50)" opacity="0.7"/>

  <!-- Jar lid (red cloth tied with string — traditional style) -->
  <path d="M26 36 Q26 28 34 26 L86 26 Q94 28 94 36 Z" fill="url(#lidGrad)"/>
  <!-- Cloth folds -->
  <path d="M28 36 Q32 32 36 36" stroke="#a93226" stroke-width="0.8" fill="none"/>
  <path d="M36 36 Q40 31 44 36" stroke="#a93226" stroke-width="0.8" fill="none"/>
  <path d="M44 36 Q48 32 52 36" stroke="#a93226" stroke-width="0.8" fill="none"/>
  <path d="M52 36 Q56 31 60 36" stroke="#a93226" stroke-width="0.8" fill="none"/>
  <path d="M60 36 Q64 32 68 36" stroke="#a93226" stroke-width="0.8" fill="none"/>
  <path d="M68 36 Q72 31 76 36" stroke="#a93226" stroke-width="0.8" fill="none"/>
  <path d="M76 36 Q80 32 84 36" stroke="#a93226" stroke-width="0.8" fill="none"/>
  <path d="M84 36 Q88 32 92 36" stroke="#a93226" stroke-width="0.8" fill="none"/>
  
  <!-- String tied around lid -->
  <ellipse cx="60" cy="36" rx="32" ry="3" fill="none" stroke="#8B6914" stroke-width="1.5"/>
  <path d="M60 39 L56 44 M60 39 L64 44" stroke="#8B6914" stroke-width="1.2" fill="none"/>

  <!-- Jar neck -->
  <rect x="38" y="24" width="44" height="4" rx="1" fill="#d4b896" stroke="#b8975a" stroke-width="0.5"/>

  <!-- Jar label -->
  <rect x="36" y="86" width="48" height="10" rx="3" fill="#fdf6ec" stroke="#c0392b" stroke-width="0.5" opacity="0.9"/>
  <text x="60" y="94" text-anchor="middle" font-family="Georgia, serif" font-weight="bold" font-size="6.5" fill="#c0392b" letter-spacing="0.5">KONASEEMA</text>

  <!-- Small leaf decoration on top -->
  <ellipse cx="56" cy="22" rx="7" ry="3.5" fill="#27ae60" transform="rotate(-25 56 22)"/>
  <ellipse cx="64" cy="21" rx="6" ry="3" fill="#2ecc71" transform="rotate(20 64 21)"/>
  <line x1="58" y1="24" x2="62" y2="18" stroke="#1e8449" stroke-width="0.8"/>
</svg>