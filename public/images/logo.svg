<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Jar body -->
  <rect x="18" y="28" width="44" height="38" rx="6" fill="#c0392b" opacity="0.9"/>
  <!-- Jar shine -->
  <rect x="22" y="32" width="8" height="24" rx="4" fill="#fff" opacity="0.15"/>
  <!-- Jar lid -->
  <rect x="14" y="22" width="52" height="10" rx="4" fill="#8B4513"/>
  <!-- Lid texture lines -->
  <line x1="18" y1="25" x2="18" y2="30" stroke="#6B3410" stroke-width="1" opacity="0.4"/>
  <line x1="24" y1="25" x2="24" y2="30" stroke="#6B3410" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="25" x2="30" y2="30" stroke="#6B3410" stroke-width="1" opacity="0.4"/>
  <line x1="36" y1="25" x2="36" y2="30" stroke="#6B3410" stroke-width="1" opacity="0.4"/>
  <line x1="42" y1="25" x2="42" y2="30" stroke="#6B3410" stroke-width="1" opacity="0.4"/>
  <line x1="48" y1="25" x2="48" y2="30" stroke="#6B3410" stroke-width="1" opacity="0.4"/>
  <line x1="54" y1="25" x2="54" y2="30" stroke="#6B3410" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="25" x2="60" y2="30" stroke="#6B3410" stroke-width="1" opacity="0.4"/>
  <!-- Lid knob -->
  <rect x="32" y="17" width="16" height="8" rx="3" fill="#A0522D"/>
  <!-- Chili inside jar -->
  <path d="M30 48 Q34 40 38 48" stroke="#27ae60" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M36 52 Q40 44 44 52" stroke="#e74c3c" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M44 46 Q48 38 52 46" stroke="#f39c12" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Small leaf on top -->
  <ellipse cx="40" cy="14" rx="6" ry="4" fill="#27ae60" transform="rotate(-20 40 14)"/>
  <ellipse cx="44" cy="13" rx="5" ry="3" fill="#2ecc71" transform="rotate(15 44 13)"/>
  <!-- Jar label area -->
  <rect x="26" y="54" width="28" height="8" rx="2" fill="#fdf6ec" opacity="0.85"/>
  <!-- K letter on label -->
  <text x="40" y="61" text-anchor="middle" font-family="serif" font-weight="bold" font-size="7" fill="#c0392b">KHP</text>
  <!-- Jar bottom curve -->
  <path d="M18 66 Q18 70 24 70 L56 70 Q62 70 62 66" fill="#a93226"/>
</svg>